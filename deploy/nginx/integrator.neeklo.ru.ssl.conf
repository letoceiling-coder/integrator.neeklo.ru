# integrator.neeklo.ru — HTTPS (enable AFTER cert exists)
# Replaces HTTP-only serving; keeps same upstream and static root.

server {
    listen 80;
    listen [::]:80;
    server_name integrator.neeklo.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name integrator.neeklo.ru;

    ssl_certificate     /etc/letsencrypt/live/integrator.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/integrator.neeklo.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/integrator.neeklo.ru.access.log;
    error_log  /var/log/nginx/integrator.neeklo.ru.error.log;

    root /var/www/integrator.neeklo.ru;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:3022/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
