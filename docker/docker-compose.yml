services:
  postgres:
    image: postgres:16-alpine
    container_name: neeklo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neeklo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neeklo}
      POSTGRES_DB: ${POSTGRES_DB:-neeklo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - neeklo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neeklo} -d ${POSTGRES_DB:-neeklo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: neeklo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - neeklo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  neeklo_pg_data:
  neeklo_redis_data:
